  #   healthcheck:
  #     test: [ "CMD", "/mailpit", "readyz" ]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  redis_data: 
  minio_data:


networks:
  app-network:
    driver: bridge
