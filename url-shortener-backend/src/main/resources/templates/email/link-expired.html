<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Your Link Expired</title>
</head>
<body style="margin:0;padding:0;background:#f1f5f9;font-family:'Segoe UI',Inter,system-ui,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f1f5f9;padding:32px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

          <!-- Header -->
          <tr>
            <td style="background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:12px 12px 0 0;padding:36px 40px;text-align:center;">
              <div style="font-size:28px;font-weight:700;color:#ffffff;">🔗 UrlShort</div>
              <div style="color:#bfdbfe;font-size:14px;margin-top:4px;">Link expiry notification</div>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background:#ffffff;padding:40px;border-left:1px solid #e2e8f0;border-right:1px solid #e2e8f0;">
              <div style="text-align:center;font-size:48px;margin-bottom:16px;">⏰</div>
              <h1 style="font-size:22px;font-weight:600;color:#0f172a;margin:0 0 12px;text-align:center;">Your Link Has Expired</h1>
              <p style="color:#475569;font-size:15px;line-height:1.6;text-align:center;margin:0 0 24px;">
                Hi <strong th:text="${fullName}">User</strong>, your short link has expired and is no longer accessible.
              </p>

              <!-- Expired link details -->
              <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:20px;margin-bottom:28px;">
                <table width="100%" cellpadding="6" cellspacing="0">
                  <tr>
                    <td style="color:#64748b;font-size:13px;font-weight:600;width:110px;">SHORT LINK</td>
                    <td style="color:#0f172a;font-size:13px;font-family:monospace;" th:text="'/' + ${shortCode}"></td>
                  </tr>
                  <tr>
                    <td style="color:#64748b;font-size:13px;font-weight:600;">DESTINATION</td>
                    <td style="color:#0f172a;font-size:13px;word-break:break-all;" th:text="${originalUrl}"></td>
                  </tr>
                </table>
              </div>

              <p style="color:#475569;font-size:14px;text-align:center;margin:0 0 24px;">
                Want to create a new link for the same destination?
              </p>

              <!-- CTA -->
              <div style="text-align:center;">
                <a th:href="${newUrlUrl}" href="#"
                   style="display:inline-block;background:#2563eb;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;padding:14px 36px;border-radius:8px;">
                  Create New Link →
                </a>
              </div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f8fafc;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 12px 12px;padding:20px 40px;text-align:center;">
              <p style="color:#94a3b8;font-size:12px;margin:0;">© 2026 <span th:text="${appName}">UrlShort</span>. All rights reserved.</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
