<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }

            backdrop-filter: blur(12px);
            border: 1px solid rgba(149, 142, 160, 0.1);

        .glow-accent {
            box-shadow: 0 0 20px rgba(208, 188, 255, 0.15);
        }

            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 2s linear infinite;
        }

<body class="bg-background font-body text-on-surface min-h-screen flex flex-col antialiased selection:bg-primary/30">
<main class="flex-grow flex items-center justify-center p-6 relative z-10">
<div class="w-full max-w-md">
<!-- Main Authentication Card -->
<div class="glass-card rounded-xl p-10 flex flex-col items-center text-center shadow-2xl">
<!-- Brand Anchor -->
<div class="mb-12">
<h1 class="text-3xl font-extrabold tracking-tighter text-white bg-clip-text bg-gradient-to-br from-[#d0bcff] to-[#a078ff]">
                    SilkShort
                </h1>
<p class="text-on-surface-variant text-xs mt-2 font-medium tracking-widest uppercase opacity-80">
                    Premium URL Shortener
                </p>
</div>
<!-- Loading Indicator -->
<div class="relative w-28 h-28 mb-10 flex items-center justify-center">
<!-- Outer Track -->
<div class="absolute inset-0 rounded-full spinner-track"></div>
<!-- Spinning Element (Indigo Glow) -->
<div class="absolute inset-0 rounded-full border-t-2 border-primary shadow-[0_0_15px_rgba(208,188,255,0.4)] animate-spin-slow"></div>

<div class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center border border-outline-variant/10 glow-accent">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="sync">sync</span>
</div>
</div>
<!-- Text Content -->
<div class="space-y-4">
<h2 class="text-2xl font-bold text-white tracking-tight">
                    Completing Sign In
                </h2>
<p class="text-on-surface-variant text-sm leading-relaxed max-w-[280px] mx-auto">
                    We're synchronizing your account details. Please don't close this window.
                </p>
</div>
<!-- Status Feedback -->
<div class="mt-12 w-full bg-surface-container-low/40 border border-outline-variant/10 rounded-lg py-3 px-4 flex items-center space-x-3">
<div class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</div>
<span class="text-[10px] font-bold text-on-surface-variant tracking-[0.2em] uppercase">
                    ESTABLISHING SECURE CONNECTION...
                </span>
</div>
</div>
<!-- Footer Utility Links -->
<div class="mt-8 flex justify-center space-x-8">
<a class="text-xs font-medium text-on-surface-variant hover:text-white transition-colors duration-200" href="#">

<a class="text-xs font-medium text-on-surface-variant hover:text-white transition-colors duration-200" href="#">

<a class="text-xs font-medium text-on-surface-variant hover:text-white transition-colors duration-200" href="#">
                Help Center
            </a>
</div>
</div>
</main>

<div class="fixed inset-0 -z-10 overflow-hidden">
<div class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] rounded-full bg-primary/10 blur-[120px]"></div>
