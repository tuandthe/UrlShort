spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: ${DB_URL:jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:5432/postgres}
    username: ${DB_USER:postgres.kcxpkxuiazfdxkdfkerg}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        "[format_sql]": true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      password: "" # no password locally

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}
      mail.smtp.starttls.required: ${MAIL_SMTP_STARTTLS_REQUIRED:false}
      mail.smtp.ssl.enable: ${MAIL_SMTP_SSL_ENABLE:false}
      mail.smtp.ssl.trust: ${MAIL_SMTP_SSL_TRUST:*}
      mail.smtp.connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:15000}
      mail.smtp.timeout: ${MAIL_SMTP_TIMEOUT:15000}
      mail.smtp.writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:15000}

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: analytics-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
    listener:
      type: batch

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:replace-me-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:replace-me-google-client-secret}
            redirect-uri: ${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/{registrationId}
            scope:
              - email
              - profile

logging:
  level:
    "[com.onluyen.url_shortener_backend]": DEBUG
    "[org.hibernate.SQL]": DEBUG
    "[org.apache.kafka]": WARN
    "[org.springframework.kafka]": INFO
    "[io.lettuce]": INFO

app:
  jwtSecret: ${JWT_SECRET}
  jwtExpirationMs: ${JWT_EXPIRATION_MS} 
  jwtRefreshExpirationMs: ${JWT_REFRESH_EXPIRATION_MS} 
  base-url: http://localhost:8080
  frontend-url: http://localhost:3002
  oauth2:
    authorizedRedirectUri: ${APP_OAUTH2_REDIRECT_URI:http://localhost:3002/oauth2/callback}
  mail:
    from: noreply@urlshort.io
    from-name: UrlShort

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:${MINIO_ENDPOINT:http://localhost:9000}}
  region: ${MINIO_REGION:us-east-1}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}
  bucket: ${MINIO_BUCKET:url-shortener}
