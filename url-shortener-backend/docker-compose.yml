services:
  app:
    build: .
    container_name: url_shortener_app
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # Database
      - DB_URL=${DB_URL:?DB_URL is required}
      - DB_USER=${DB_USER:?DB_USER is required}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_MAX_POOL_SIZE=${DB_MAX_POOL_SIZE:-3}
      - DB_MIN_IDLE=${DB_MIN_IDLE:-0}
      - DB_CONNECTION_TIMEOUT_MS=${DB_CONNECTION_TIMEOUT_MS:-30000}
      - DB_MAX_LIFETIME_MS=${DB_MAX_LIFETIME_MS:-300000}
      - DB_IDLE_TIMEOUT_MS=${DB_IDLE_TIMEOUT_MS:-120000}
      - DB_FLYWAY_CONNECT_RETRIES=${DB_FLYWAY_CONNECT_RETRIES:-8}
      # Redis
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - REDIS_HOST=${REDIS_HOST:?REDIS_HOST is required}
      - REDIS_PORT=${REDIS_PORT:?REDIS_PORT is required}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - REDIS_SSL_ENABLED=${REDIS_SSL_ENABLED:?REDIS_SSL_ENABLED is required}
      # Kafka
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      # Google OAuth2
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID is required}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:?GOOGLE_CLIENT_SECRET is required}
      - APP_BASE_URL=${APP_BASE_URL:?APP_BASE_URL is required}
      - APP_FRONTEND_URL=${APP_FRONTEND_URL:?APP_FRONTEND_URL is required}
      - APP_OAUTH2_REDIRECT_URI=${APP_OAUTH2_REDIRECT_URI:?APP_OAUTH2_REDIRECT_URI is required}
      - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:?APP_CORS_ALLOWED_ORIGINS is required}
      # JWT
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:?JWT_EXPIRATION_MS is required}
      - JWT_REFRESH_EXPIRATION_MS=${JWT_REFRESH_EXPIRATION_MS:?JWT_REFRESH_EXPIRATION_MS is required}
      # MinIO
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:?MINIO_ENDPOINT is required}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:?MINIO_PUBLIC_ENDPOINT is required}
      - MINIO_REGION=${MINIO_REGION:?MINIO_REGION is required}
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      - MINIO_BUCKET=${MINIO_BUCKET:-url-shortener}
      # Mail
      - MAIL_HOST=${MAIL_HOST:?MAIL_HOST is required}
      - MAIL_PORT=${MAIL_PORT:?MAIL_PORT is required}
      - MAIL_USERNAME=${MAIL_USERNAME:?MAIL_USERNAME is required}
      - MAIL_PASSWORD=${MAIL_PASSWORD:?MAIL_PASSWORD is required}
      - MAIL_SMTP_AUTH=${MAIL_SMTP_AUTH:-false}
      - MAIL_SMTP_STARTTLS_ENABLE=${MAIL_SMTP_STARTTLS_ENABLE:-false}
      - MAIL_SMTP_STARTTLS_REQUIRED=${MAIL_SMTP_STARTTLS_REQUIRED:-false}
      - MAIL_SMTP_SSL_ENABLE=${MAIL_SMTP_SSL_ENABLE:-false}
      - MAIL_SMTP_SSL_TRUST=${MAIL_SMTP_SSL_TRUST:-*}
      - MAIL_SMTP_CONNECTION_TIMEOUT=${MAIL_SMTP_CONNECTION_TIMEOUT:-15000}
      - MAIL_SMTP_TIMEOUT=${MAIL_SMTP_TIMEOUT:-15000}
      - MAIL_SMTP_WRITE_TIMEOUT=${MAIL_SMTP_WRITE_TIMEOUT:-15000}
      - MAIL_FROM=${MAIL_FROM:?MAIL_FROM is required}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:?MAIL_FROM_NAME is required}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app-network

  # mysql:
  #   image: mysql:8.0
  #   container_name: url_shortener_mysql
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
  #     MYSQL_DATABASE: ${MYSQL_DATABASE:-url_shortener}
  #     MYSQL_USER: ${MYSQL_USER:?MYSQL_USER is required}
  #     MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
