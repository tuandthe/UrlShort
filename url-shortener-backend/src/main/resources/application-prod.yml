spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:3}
      minimum-idle: ${DB_MIN_IDLE:0}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:300000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:120000}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    connect-retries: ${DB_FLYWAY_CONNECT_RETRIES:8}

  data:
    redis:
      url: ${REDIS_URL:}
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:true}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
      mail.smtp.starttls.required: ${MAIL_SMTP_STARTTLS_REQUIRED:true}
      mail.smtp.ssl.enable: ${MAIL_SMTP_SSL_ENABLE:false}
      mail.smtp.ssl.trust: ${MAIL_SMTP_SSL_TRUST:*}
      mail.smtp.connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT:15000}
      mail.smtp.timeout: ${MAIL_SMTP_TIMEOUT:15000}
      mail.smtp.writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT:15000}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: analytics-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
    listener:
      type: batch

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: ${APP_BASE_URL:?APP_BASE_URL is required}/login/oauth2/code/{registrationId}
            scope:
              - email
              - profile

app:
  base-url: ${APP_BASE_URL:?APP_BASE_URL is required}
  frontend-url: ${APP_FRONTEND_URL:?APP_FRONTEND_URL is required}
  oauth2:
    authorizedRedirectUri: ${APP_OAUTH2_REDIRECT_URI:?APP_OAUTH2_REDIRECT_URI is required}
  mail:
    from: ${MAIL_FROM:noreply@urlshort.io}
    from-name: ${MAIL_FROM_NAME:UrlShort}

minio:
  endpoint: ${MINIO_ENDPOINT:?MINIO_ENDPOINT is required}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:?MINIO_PUBLIC_ENDPOINT is required}
  region: ${MINIO_REGION:?MINIO_REGION is required}
  access-key: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
  secret-key: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
  bucket: ${MINIO_BUCKET:url-shortener}

logging:
  level:
    root: INFO
    "[com.onluyen.url_shortener_backend]": DEBUG
    "[org.hibernate.SQL]": WARN
    "[org.apache.kafka]": WARN
    "[org.springframework.kafka]": INFO
    "[io.lettuce]": INFO
